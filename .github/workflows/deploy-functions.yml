name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase link --project-ref rjeuoheiayfzioqfdoom
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - run: |
          supabase functions deploy license-proxy --no-verify-jwt
          supabase functions deploy print-ticket --no-verify-jwt
          supabase functions deploy manage-users --no-verify-jwt
          supabase functions deploy reset-password --no-verify-jwt
          supabase functions deploy setup-admin --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
